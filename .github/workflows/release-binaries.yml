# Compile the gateway into standalone binaries and attach them to the GitHub
# Release, so users can install a single file (no Node needed) via scripts/install.sh.
#
# Trigger by pushing a tag like `v0.1.0`. Bun cross-compiles all four targets from
# ONE runner (scripts/build.mjs) — it must use that script, not `bun build --compile`
# on the CLI, because NER runs on the onnxruntime-web WASM backend in the binary and
# the build needs a plugin to stub the native onnxruntime-node/sharp imports + embed
# the wasm. We build on macOS so the two mac binaries can be ad-hoc code-signed. The
# gateway depends on chatpanel-pii, so it must be on npm first (`npm install` pulls it).
name: Release binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Create the release (once)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Standalone ChatPanel Privacy Gateway binaries — no Node.js required.

          **Install (macOS/Linux):**
          \`curl -fsSL https://raw.githubusercontent.com/chatpanel/chatpanel-gateway/main/scripts/install.sh | bash\`

          Or run a downloaded binary once to start at login:
          \`chmod +x chatpanel-gateway-* && ./chatpanel-gateway-* --install\`

          ⚠️ Not yet code-signed, so macOS Gatekeeper / Windows SmartScreen may warn
          on first run (macOS: right-click → Open). Signing is coming." \
            || echo "Release ${GITHUB_REF_NAME} already exists — continuing."

  build:
    needs: create-release
    if: ${{ always() && needs.create-release.result != 'failure' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install   # pulls @chatpanel/pii + transformers + onnxruntime-web (wasm)
      - uses: oven-sh/setup-bun@v2
      - name: Build all four binaries (Bun cross-compile)
        run: bun scripts/build.mjs   # → dist/chatpanel-gateway-{macos-arm64,macos-x64,linux-x64,windows-x64.exe}
      - name: Ad-hoc sign the macOS binaries
        run: |
          codesign --force --sign - dist/chatpanel-gateway-macos-arm64
          codesign --force --sign - dist/chatpanel-gateway-macos-x64
      - name: Upload binaries to the release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          for f in dist/chatpanel-gateway-*; do
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber
          done
